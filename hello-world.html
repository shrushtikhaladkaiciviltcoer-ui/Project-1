<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f4ee;
      --muted: #b9c1c9;
      --blue: #4cc9f0;
      --coral: #ff6b6b;
      --gold: #ffd166;
      --green: #6ee7b7;
      --panel: rgba(13, 18, 32, 0.68);
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(76, 201, 240, 0.34), transparent 30%),
        radial-gradient(circle at 82% 28%, rgba(255, 107, 107, 0.30), transparent 28%),
        radial-gradient(circle at 50% 86%, rgba(110, 231, 183, 0.24), transparent 34%),
        #0b1020;
      color: var(--ink);
    }

    .stage {
      position: relative;
      width: min(92vw, 880px);
      padding: clamp(28px, 5vw, 68px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(22px);
      text-align: center;
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(76, 201, 240, 0.58), rgba(255, 209, 102, 0.42), rgba(255, 107, 107, 0.50));
      opacity: 0.34;
      filter: blur(18px);
    }

    .sparkle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 22px var(--gold);
      animation: float 5s ease-in-out infinite;
    }

    .sparkle:nth-child(1) {
      top: 28px;
      left: 34px;
    }

    .sparkle:nth-child(2) {
      right: 58px;
      bottom: 46px;
      width: 9px;
      height: 9px;
      background: var(--blue);
      box-shadow: 0 0 20px var(--blue);
      animation-delay: -1.6s;
    }

    .sparkle:nth-child(3) {
      right: 22%;
      top: 42px;
      width: 7px;
      height: 7px;
      background: var(--green);
      box-shadow: 0 0 18px var(--green);
      animation-delay: -3s;
    }

    .eyebrow {
      margin: 0 0 18px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 11vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .gradient-text {
      display: block;
      background: linear-gradient(90deg, var(--ink), var(--blue), var(--gold), var(--coral));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      max-width: 620px;
      margin: 24px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.24rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      padding: 13px 20px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.10);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: #07111f;
    }

    .button:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.16);
    }

    .button.primary:hover {
      background: linear-gradient(135deg, var(--green), var(--gold));
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-16px) scale(1.25);
      }
    }

    @media (max-width: 560px) {
      body {
        overflow: auto;
      }

      .stage {
        border-radius: 22px;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Fancy hello world page">
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>

    <p class="eyebrow">A tiny page with style</p>
    <h1>
      Hello
      <span class="gradient-text">World</span>
    </h1>
    <p class="subtitle">
      Welcome to a brighter first file: glassy, colorful, responsive, and ready to make this folder feel a little more alive.
    </p>
    <div class="actions" aria-label="Page actions">
      <a class="button primary" href="#">Start Here</a>
      <a class="button" href="#">Explore</a>
    </div>
  </main>
</body>
</html>
