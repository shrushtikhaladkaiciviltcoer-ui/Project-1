<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f4ee;
      --muted: #b9c1c9;
      --blue: #4cc9f0;
      --coral: #ff6b6b;
      --gold: #ffd166;
      --green: #6ee7b7;
      --panel: rgba(13, 18, 32, 0.68);
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(110, 231, 183, 0.30), transparent 28%),
        radial-gradient(circle at 84% 28%, rgba(255, 209, 102, 0.28), transparent 30%),
        radial-gradient(circle at 48% 88%, rgba(76, 201, 240, 0.24), transparent 34%),
        #0b1020;
      color: var(--ink);
    }

    .site-nav {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 13, 25, 0.70);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(18px);
      transform: translateX(-50%);
    }

    .site-nav a {
      min-width: 86px;
      border-radius: 999px;
      padding: 10px 15px;
      color: var(--muted);
      text-align: center;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 800;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .site-nav a:hover {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.10);
      transform: translateY(-1px);
    }

    .site-nav a[aria-current="page"] {
      color: #07111f;
      background: linear-gradient(135deg, var(--gold), var(--green));
    }

    .stage {
      position: relative;
      width: min(92vw, 900px);
      margin: 96px 0 32px;
      padding: clamp(28px, 5vw, 64px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(22px);
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(110, 231, 183, 0.48), rgba(76, 201, 240, 0.48), rgba(255, 209, 102, 0.42));
      opacity: 0.34;
      filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 18px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 6.4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--ink), var(--green), var(--blue), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(22px, 4vw, 42px);
      margin-top: 34px;
      align-items: start;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.7vw, 1.18rem);
      line-height: 1.75;
    }

    .contact-list {
      display: grid;
      gap: 14px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 18px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, background 180ms ease;
    }

    .contact-link:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.13);
    }

    .contact-link span {
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 13px 15px;
      color: var(--ink);
      font: inherit;
      background: rgba(255, 255, 255, 0.09);
      outline: none;
    }

    textarea {
      min-height: 126px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(76, 201, 240, 0.16);
    }

    button {
      width: fit-content;
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      color: #07111f;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      background: linear-gradient(135deg, var(--blue), var(--green));
      transition: transform 180ms ease, background 180ms ease;
    }

    button:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, var(--green), var(--gold));
    }

    @media (max-width: 760px) {
      .contact-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .site-nav {
        top: 14px;
        width: min(92vw, 360px);
        justify-content: center;
      }

      .site-nav a {
        min-width: 0;
        flex: 1;
        padding-inline: 10px;
      }

      .stage {
        margin-top: 88px;
        border-radius: 22px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Primary navigation">
    <a href="hello-world.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>

  <main class="stage" aria-label="Contact page">
    <p class="eyebrow">Contact</p>
    <h1>Say hello from <span class="gradient-text">anywhere</span>.</h1>

    <section class="contact-layout">
      <div>
        <p>
          This page is ready for your real details. For now, it gives the site a neat contact area, quick links, and a simple form layout.
        </p>
        <div class="contact-list" aria-label="Contact options">
          <a class="contact-link" href="mailto:hello@example.com">
            Email <span>hello@example.com</span>
          </a>
          <a class="contact-link" href="tel:+10000000000">
            Phone <span>+1 000 000 0000</span>
          </a>
        </div>
      </div>

      <form>
        <label>
          Name
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Message
          <textarea name="message" placeholder="Write a friendly note"></textarea>
        </label>
        <button type="button">Send Message</button>
      </form>
    </section>
  </main>
</body>
</html>
